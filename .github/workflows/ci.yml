name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Unit tests
        run: bun run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          # Placeholders so $env/static modules resolve at build time (not real secrets).
          BETTER_AUTH_SECRET: build-time-placeholder-secret-min-32-chars
          BETTER_AUTH_URL: http://localhost:4173
          PUBLIC_BASE_URL: http://localhost:4173
          DATABASE_URI: mongodb://127.0.0.1:27017/ci
          OPEN_AI_KEY: sk-ci-placeholder
          PUBLIC_GOOGLE_CLIENT_ID: ci.apps.googleusercontent.com
          PUBLIC_POSTHOG_PROJECT_TOKEN: phc_ci
          PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          PUBLIC_DESMOS_API_KEY: ci
          RESEND_API_KEY: re_ci
          GITHUB_BUG_REPORT_TOKEN: ghp_ci
