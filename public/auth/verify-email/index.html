<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Email - Free AP Practice</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/components/footer/footer.css">
    <script src="/js/theme-init.js"></script>
    <script src="/js/cookies.js"></script>
    <script src="/components/cookies/cookie-banner.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 0;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-lg);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        #footer-container {
            margin-top: auto;
        }

        .login-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            padding: var(--space-3xl);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--space-3xl);
        }

        .login-header h1 {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--text-primary);
            margin-bottom: var(--space-md);
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: var(--font-size-base);
        }

        .btn-login { width:100%; padding: var(--space-lg); background: var(--accent-color); color: white; border:none; border-radius:8px; font-size:var(--font-size-base); }
        .status.success { color: var(--success-color, #1d7f3f); }
        .status.error { color: var(--error-color); }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--accent-color);
            color: #fff;
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
    </style>
</head>
<body>
    <main>
        <div class="login-wrapper">
            <div class="login-container">
                <div class="login-header">
                    <h1>Verify your email</h1>
                    <p class="login-sub">Confirm your account to continue</p>
                </div>

                <div id="status" class="status">Verifying…</div>
                <div id="actions" style="margin-top:12px"></div>
            </div>
        </div>
    </main>

    <script src="/js/authorization.js"></script>
    <script>
        (async function(){
            if (window.location.hostname === 'www.freeappractice.org') {
                const target = 'https://freeappractice.org' + window.location.pathname + window.location.search + window.location.hash;
                window.location.replace(target);
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const statusEl = document.getElementById('status');
            const actions = document.getElementById('actions');
            const tokenParam = 'token=' + encodeURIComponent(token || '');

            async function fetchVerification() {
                const endpointPaths = ['/api/auth/verify-email?' + tokenParam];
                const host = window.location.hostname;

                if (host === 'www.freeappractice.org') {
                    endpointPaths.push('https://freeappractice.org/api/auth/verify-email?' + tokenParam);
                } else if (host === 'freeappractice.org') {
                    endpointPaths.push('https://www.freeappractice.org/api/auth/verify-email?' + tokenParam);
                }

                let lastError = null;

                for (const endpoint of endpointPaths) {
                    try {
                        const resp = await fetch(endpoint, {
                            method: 'GET',
                            credentials: 'same-origin'
                        });
                        return resp;
                    } catch (err) {
                        lastError = err;
                    }
                }

                throw lastError || new Error('Unable to reach verification endpoint');
            }

            if (!token) {
                statusEl.textContent = 'Verification token not found in the URL.';
                statusEl.classList.add('error');
                actions.innerHTML = '<a class="button" href="/auth/login/">Go to Login</a>';
                return;
            }

            try {
                const resp = await fetchVerification();
                if (resp.ok) {
                    const data = await resp.json();
                    statusEl.textContent = data.message || 'Email verified successfully.';
                    statusEl.classList.add('success');

                    // If the server returned a token and user, auto-login then redirect to app
                    if (data.token && data.user) {
                        try {
                            if (typeof setAuthToken === 'function') {
                                setAuthToken(data.token);
                                if (typeof setUserData === 'function') setUserData(data.user);
                            } else {
                                // fallback: write directly to localStorage using the same keys
                                localStorage.setItem('auth_token', data.token);
                                localStorage.setItem('user_data', JSON.stringify(data.user));
                            }
                            window.location.href = '/app/';
                            return;
                        } catch (e) {
                            console.warn('Auto-login failed', e);
                        }
                    }

                    actions.innerHTML = '<a class="button" href="/auth/login/">Continue to Login</a>';
                } else {
                    const err = await resp.json().catch(()=>({ error: 'Failed to verify' }));
                    statusEl.textContent = err.error || 'Failed to verify email.';
                    statusEl.classList.add('error');
                    actions.innerHTML = '<a class="button" href="/">Return to Home</a>';
                }
            } catch (e) {
                console.error('verify error', e);
                statusEl.textContent = 'Network error while verifying email. Please try again from https://freeappractice.org/auth/verify-email/?token=' + encodeURIComponent(token);
                statusEl.classList.add('error');
                actions.innerHTML = '<a class="button" href="/">Return to Home</a>';
            }
        })();
    </script>
    <div id="footer-container"></div>
    <script src="/components/footer/footer.js"></script>
</body>
</html>
